<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TrendOS 看板演示</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #081525; color: #fff; font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
      main { width: min(1120px, 92vw); }
      h1 { margin: 0 0 10px; font-size: clamp(24px, 4vw, 40px); }
      p { margin: 0 0 24px; color: #a9b7cb; }
      video { width: 100%; display: block; border-radius: 18px; background: #fff; box-shadow: 0 20px 70px rgba(0,0,0,.36); }
    </style>
  </head>
  <body>
    <main>
      <h1>TrendOS 看板操作演示</h1>
      <p>总览 → 区域筛选 → 热点详情 → 运营候选 → 配置中心</p>
      <video controls autoplay muted playsinline>
        <source src="assets/demo-video/trendos-dashboard-demo.webm" type="video/webm" />
      </video>
    </main>
  </body>
</html>
